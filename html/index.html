<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VET24 WEB MAPPING</title>

  <!-- นำเข้า css leaflet library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- css for minimap -->
  <link rel="stylesheet" href="https://norkart.github.io/Leaflet-MiniMap/Control.MiniMap.css" />

  <!-- นำเข้า JS leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- leaflet-ajax -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-ajax/2.1.0/leaflet.ajax.min.js"
    integrity="sha512-Abr21JO2YqcJ03XGZRPuZSWKBhJpUAR6+2wH5zBeO4wAw4oksr8PRdF+BKIRsxvCdq+Mv4670rZ+dLnIyabbGw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- นำเข้า JQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
    integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- js for minimap -->
  <script src="https://norkart.github.io/Leaflet-MiniMap/Control.MiniMap.js"></script>

  <!-- External CSS-->
  <link rel="stylesheet" href="../css/style.css" />

</head>

<body>
  <h1 id="map-title">ตำแหน่งโรงพยาบาลสัตว์ 24 ชั่วโมง</h1>
  <div id="map"></div>
  
  <!-- popup แสดงรายละเอียดเส้นทาง -->
  <div id="route-info"></div>

  <!-- ช่องค้นหา -->
  <div id="search-container">
    <input type="text" id="search-box" placeholder="🔍 ค้นหาโรงพยาบาล..." />
    <div id="search-results"></div>
  </div>


  <!-- External JS-->
  <script src="../js/main.js"></script>
  <script src="../js/function.js"></script>
</body>

</html>
